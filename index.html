                            <path d="M11.071.653a.457.457 0 0 0-.304-.102.493.493 0 0 0-.381.178l-6.19 7.636-2.011-2.095a.463.463 0 0 0-.336-.153.457.457 0 0 0-.339.142.477.477 0 0 0 .004.67l2.357 2.46a.465.465 0 0 0 .336.152.457.457 0 0 0 .347-.164l6.46-7.965a.477.477 0 0 0 .057-.588z" fill={m.seen?'#53bdeb':'rgba(255,255,255,0.4)'}/>
                            {m.seen&&<path d="M7.511 8.452l.553-.68 5.947-7.322a.457.457 0 0 0-.304-.102.493.493 0 0 0-.381.178l-6.19 7.636" fill="#53bdeb"/>}
                          </svg>
                        )}
                      </span>
                    </div>
                    <div style={{clear:'both'}}/>
                  </div>
                </div>
              </div>
            </React.Fragment>
          );
        })}
        <div ref={bottomRef}/>
      </div>

      {/* Menu */}
      {menuMsg&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:100,background:'rgba(0,0,0,0.5)'}} onClick={()=>setMenuMsg(null)}>
          <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'#233138',borderRadius:12,minWidth:220,overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
            {[
              {label:'Répondre',action:()=>{setReplyTo({id:menuMsg.id,rawText:parseMsg(menuMsg).text,from:menuMsg.from});setMenuMsg(null);inputRef.current?.focus()}},
              {label:'Copier',action:()=>{navigator.clipboard?.writeText(parseMsg(menuMsg).text);setMenuMsg(null)}},
              {label:menuMsg.pinned?'Désépingler':'Épingler',action:()=>{pinMsg(menuMsg.id);setMenuMsg(null)}},
              ...(menuMsg.from===myRole?[{label:'Supprimer',action:()=>{deleteMsg(menuMsg.id);setMenuMsg(null)},danger:true}]:[]),
            ].map((item,idx)=>(
              <button key={idx} onClick={item.action} style={{width:'100%',padding:'14px 20px',textAlign:'left',fontSize:16,color:item.danger?'#ef4444':'#e9edef',borderBottom:'1px solid #1a262d',background:'transparent'}}>{item.label}</button>
            ))}
          </div>
        </div>
      )}

      {/* Reply */}
      {replyTo&&(
        <div style={{padding:'6px 8px',background:'#1f2c34',display:'flex',alignItems:'stretch',gap:8}}>
          <div style={{flex:1,padding:'6px 12px',borderRadius:8,background:'#111b21',borderLeft:`4px solid ${replyTo.from===myRole?'#53bdeb':'#00a884'}`,overflow:'hidden'}}>
            <div style={{fontSize:12,fontWeight:600,color:replyTo.from===myRole?'#53bdeb':'#00a884'}}>{replyTo.from===myRole?'Toi':otherName}</div>
            <div style={{fontSize:13,color:'#8696a0',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',marginTop:1}}>{replyTo.rawText}</div>
          </div>
          <button onClick={()=>setReplyTo(null)} style={{width:28,display:'flex',alignItems:'center',justifyContent:'center',color:'#8696a0'}}>
            <div style={{width:16,height:16}}><I.x/></div>
          </button>
        </div>
      )}

      {/* Input */}
      <div style={{padding:'4px 8px 6px',background:'#1f2c34',display:'flex',gap:6,alignItems:'flex-end'}}>
        <div style={{flex:1,display:'flex',alignItems:'flex-end',background:'#2a3942',borderRadius:24,padding:'2px 12px'}}>
          <input ref={inputRef} placeholder="Message" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')doSend()}}
            style={{flex:1,border:'none',outline:'none',fontSize:16,padding:'10px 0',fontFamily:'inherit',background:'transparent',color:'#e9edef'}}/>
        </div>
        <button onClick={doSend} style={{width:48,height:48,borderRadius:24,background:'#00a884',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <svg viewBox="0 0 24 24" fill="#111b21" style={{width:24,height:24}}><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  );
}

// ============== MANAGER DASHBOARD ==============
function ManagerDashboard(){
  const {orders,sorted,config,expenses,now,counts}=useContext(Ctx);
  const [tab,setTab]=useState('live');

  const today=new Date().toDateString();
  const livres=orders.filter(o=>o.status===S.LIVRE);
  const allConfirmed=orders.filter(o=>[S.LIVRAISON,S.LIVRE].includes(o.status));
  const appelesAuj=orders.filter(o=>o.attempts.some(a=>new Date(a.ts).toDateString()===today));
  const confirmesAuj=appelesAuj.filter(o=>[S.LIVRAISON,S.LIVRE].includes(o.status));
  const tauxConfirm=appelesAuj.length>0?Math.round(confirmesAuj.length/appelesAuj.length*100):0;
  const tauxLiv=allConfirmed.length>0?Math.round(livres.length/allConfirmed.length*100):0;
  const deliveryOk=tauxLiv>=80;
  const salaryRate=calcSalaryRate(tauxConfirm,tauxLiv,config.salaryGrid);

  const pCA=livres.reduce((s,o)=>(o.pricePaid||o.totalPrice)*o.quantity+s,0);
  const pDelCost=livres.reduce((s,o)=>o.deliveryCost+s,0);
  const pSalary=livres.length*salaryRate;
  const todayExp=expenses.filter(e=>new Date(e.date).toDateString()===today);
  const pExpTotal=todayExp.reduce((s,e)=>e.amount+s,0);
  const toVerse=pCA-pDelCost-pSalary-pExpTotal;

  // Alerts
  const nonAppeles=orders.filter(o=>o.status===S.NEW||(o.timerExp&&now>o.timerExp&&[S.INJOIGNABLE,S.RAPPELE,S.REPORTE].includes(o.status)));
  const retournements=orders.filter(o=>o.attempts.length>=2&&o.status===S.ANNULE&&o.attempts.some(a=>[S.LIVRAISON,S.LIVRE].includes(a.status)));
  const lastAction=orders.flatMap(o=>o.attempts.map(a=>({...a,on:o.orderNumber,fn:o.fullName}))).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const lastActionTime=lastAction[0]?new Date(lastAction[0].ts).getTime():0;
  const inactiveMins=lastActionTime?Math.floor((now-lastActionTime)/60000):999;

  // All activity feed
  const feed=useMemo(()=>{
    return orders.flatMap(o=>o.attempts.map(a=>({...a,orderNumber:o.orderNumber,fullName:o.fullName,productName:o.productName,pricePaid:o.pricePaid||o.totalPrice,qty:o.quantity}))).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  },[orders]);

  const todayFeed=feed.filter(f=>new Date(f.ts).toDateString()===today);

  return(
    <div className="page">
      {/* Header */}
      <div style={{position:'sticky',top:0,zIndex:40,background:'var(--bg)',borderBottom:'1px solid var(--border)'}}>
        <div style={{padding:'14px 16px 6px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <h1 style={{fontSize:22,fontWeight:700,letterSpacing:-0.5}}>Dashboard</h1>
            <span style={{fontSize:12,color:'var(--muted)'}}>Manager — {config.closeuseName||'Closeuse'}</span>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:20,fontWeight:800,fontVariantNumeric:'tabular-nums',letterSpacing:-0.5}}>{new Date().toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>
            <div style={{fontSize:10,color:'var(--muted)'}}>{new Date().toLocaleDateString('fr',{weekday:'short',day:'numeric',month:'short'})}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:6,padding:'6px 16px 10px'}}>
          {[{k:'live',l:'Temps réel'},{k:'activity',l:'Activité'},{k:'finance',l:'Finances'}].map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} style={{
              padding:'7px 14px',borderRadius:24,fontSize:12.5,fontWeight:tab===t.k?700:500,
              background:tab===t.k?'var(--dark)':'#fff',color:tab===t.k?'#fff':'var(--text)',
              border:tab===t.k?'none':'1.5px solid var(--border)',flexShrink:0
            }}>{t.l}</button>
          ))}
        </div>
      </div>

      {/* ===== ALERTS ===== */}
      {(retournements.length>0||nonAppeles.length>0)&&(
        <div style={{padding:'8px 12px 0',display:'flex',flexDirection:'column',gap:6}}>
          {retournements.length>0&&(
            <div style={{padding:'10px 12px',borderRadius:12,background:'#FEE2E2',border:'1.5px solid #FECACA',display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:18,height:18,color:'var(--red-vivid)'}}><I.zap/></div>
              <div style={{fontSize:13}}><b style={{color:'var(--red-text)'}}>{retournements.length} retournement{retournements.length>1?'s':''}</b><span style={{color:'var(--red-text)',opacity:0.8}}> — confirmée(s) puis annulée(s)</span></div>
            </div>
          )}
          {nonAppeles.length>0&&(
            <div style={{padding:'10px 12px',borderRadius:12,background:'var(--amber-bg)',border:'1.5px solid #FDE68A',display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:18,height:18,color:'var(--amber-vivid)'}}><I.phone/></div>
              <div style={{fontSize:13,color:'var(--amber-text)'}}><b>{nonAppeles.length} client{nonAppeles.length>1?'s':''}</b> en attente d'appel</div>
            </div>
          )}
        </div>
      )}

      {/* Security alerts */}
      {(()=>{const alerts=gs('securityAlerts',[]);const recent=alerts.filter(a=>Date.now()-a.ts<864e5);return recent.length>0?(
        <div style={{padding:'4px 12px'}}>
          <div style={{padding:'10px 12px',borderRadius:12,background:'#1a1a1a',border:'1.5px solid #333',display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:18,height:18,color:'#F59E0B'}}><I.eye/></div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:'#F59E0B'}}>{recent.length} tentative{recent.length>1?'s':''} de connexion bloquée{recent.length>1?'s':''}</div>
              <div style={{fontSize:11,color:'#888',marginTop:2}}>Dernier code essayé : {recent[recent.length-1].lastCode} — {new Date(recent[recent.length-1].ts).toLocaleString('fr')}</div>
            </div>
            <button onClick={()=>{ss('securityAlerts',[]);window.location.reload()}} style={{padding:'4px 10px',borderRadius:6,background:'#333',color:'#888',fontSize:10,fontWeight:600}}>OK</button>
          </div>
        </div>
      ):null})()}

      {/* ===== TAB: LIVE ===== */}
      {tab==='live'&&(
        <>
          {/* KPI Cards */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,padding:'10px 12px'}}>
            <div style={{background:'#fff',borderRadius:14,padding:14,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
              <div style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>Appelées aujourd'hui</div>
              <div style={{fontSize:28,fontWeight:800,letterSpacing:-1,marginTop:2}}>{appelesAuj.length}</div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>sur {orders.length} total</div>
            </div>
            <div style={{background:'#fff',borderRadius:14,padding:14,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
              <div style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>Confirmées aujourd'hui</div>
              <div style={{fontSize:28,fontWeight:800,letterSpacing:-1,marginTop:2,color:'var(--teal-vivid)'}}>{confirmesAuj.length}</div>
              <div style={{fontSize:11,fontWeight:600,marginTop:2,color:tauxConfirm>=60?'var(--green-vivid)':'var(--red-vivid)'}}>{tauxConfirm}% confirmation</div>
            </div>
            <div style={{background:'#fff',borderRadius:14,padding:14,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
              <div style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>Livrées (global)</div>
              <div style={{fontSize:28,fontWeight:800,letterSpacing:-1,marginTop:2,color:'var(--green-vivid)'}}>{livres.length}</div>
              <div style={{fontSize:11,fontWeight:600,marginTop:2,color:deliveryOk?'var(--green-vivid)':'var(--red-vivid)'}}>{tauxLiv}% livraison {deliveryOk?'✓':'✗'}</div>
            </div>
            <div style={{background:'#fff',borderRadius:14,padding:14,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
              <div style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>Dernière activité</div>
              <div style={{fontSize:16,fontWeight:800,letterSpacing:-0.5,marginTop:2,color:inactiveMins>=30?'var(--red-vivid)':inactiveMins>=15?'var(--amber-vivid)':'var(--green-vivid)'}}>{lastActionTime?new Date(lastActionTime).toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'}):'—'}</div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{lastActionTime?new Date(lastActionTime).toLocaleDateString('fr',{day:'numeric',month:'short'}):'Aucune action'}</div>
            </div>
          </div>

          {/* Status distribution */}
          <div style={{margin:'0 12px',background:'#fff',borderRadius:14,padding:14,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>Répartition des commandes</div>
            {[
              {s:S.NEW,l:'Nouvelles',c:'var(--blue-vivid)'},
              {s:S.LIVRAISON,l:'En livraison',c:'var(--teal-vivid)'},
              {s:S.INJOIGNABLE,l:'Injoignables',c:'var(--red-vivid)'},
              {s:S.RAPPELE,l:'Rappelés',c:'var(--pink-vivid)'},
              {s:S.REPORTE,l:'Reportées',c:'var(--amber-vivid)'},
              {s:S.LIVRE,l:'Livrées',c:'var(--green-vivid)'},
              {s:S.ANNULE,l:'Annulées',c:'var(--gray-vivid)'},
            ].map((r,i)=>{
              const n=counts[r.s]||0;
              const pct=orders.length>0?n/orders.length*100:0;
              return(
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0'}}>
                  <div style={{width:8,height:8,borderRadius:4,background:r.c,flexShrink:0}}/>
                  <span style={{fontSize:12,flex:1}}>{r.l}</span>
                  <span style={{fontSize:13,fontWeight:700,minWidth:20,textAlign:'right'}}>{n}</span>
                  <div style={{width:60,height:5,background:'#f0f0ec',borderRadius:3,overflow:'hidden'}}>
                    <div style={{width:`${pct}%`,height:'100%',background:r.c,borderRadius:3}}/>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Last 5 actions */}
          <div style={{margin:'8px 12px',background:'#fff',borderRadius:14,padding:14,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>Dernières actions</div>
            {todayFeed.slice(0,8).map((f,i)=>(
              <div key={i} style={{display:'flex',gap:8,padding:'6px 0',borderBottom:i<7?'1px solid #f5f5f0':'none',alignItems:'center'}}>
                <span style={{fontSize:11,color:'var(--muted)',fontVariantNumeric:'tabular-nums',whiteSpace:'nowrap',width:42}}>{new Date(f.ts).toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'})}</span>
                <Badge status={f.status} size="sm"/>
                <div style={{flex:1,overflow:'hidden'}}>
                  <span style={{fontSize:12,fontWeight:600}}>{f.orderNumber}</span>
                  <span style={{fontSize:11,color:'var(--muted)',marginLeft:4}}>{f.fullName}</span>
                </div>
              </div>
            ))}
            {todayFeed.length===0&&<div style={{padding:12,textAlign:'center',color:'var(--muted)',fontSize:13}}>Aucune action aujourd'hui</div>}
          </div>
        </>
      )}

      {/* ===== TAB: ACTIVITY ===== */}
      {tab==='activity'&&(
        <div style={{padding:'8px 12px'}}>
          <div style={{background:'#fff',borderRadius:14,padding:14,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>Fil d'activité complet</div>
            {feed.slice(0,30).map((f,i)=>{
              const isToday=new Date(f.ts).toDateString()===today;
              const prevIsToday=i>0&&new Date(feed[i-1].ts).toDateString()===today;
              const showDateHeader=i===0||(new Date(f.ts).toDateString()!==new Date(feed[i-1].ts).toDateString());
              return(
                <React.Fragment key={i}>
                  {showDateHeader&&(
                    <div style={{padding:'8px 0 4px',fontSize:11,fontWeight:700,color:'var(--muted)',borderBottom:'1px solid #f0f0ec',marginTop:i>0?8:0}}>
                      {isToday?"Aujourd'hui":new Date(f.ts).toLocaleDateString('fr',{weekday:'short',day:'numeric',month:'short'})}
                    </div>
                  )}
                  <div style={{display:'flex',gap:8,padding:'8px 0',borderBottom:'1px solid #f8f8f5',alignItems:'flex-start'}}>
                    <span style={{fontSize:11,color:'var(--muted)',fontVariantNumeric:'tabular-nums',whiteSpace:'nowrap',width:42,paddingTop:2}}>{new Date(f.ts).toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'})}</span>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                        <span style={{fontSize:13,fontWeight:700}}>{f.orderNumber}</span>
                        <Badge status={f.status} size="sm"/>
                      </div>
                      <div style={{fontSize:12,color:'#555'}}>{f.fullName} — {f.productName} ×{f.qty}</div>
                      {f.comment&&<div style={{fontSize:11,color:'var(--muted)',fontStyle:'italic',marginTop:2}}>💬 {f.comment}</div>}
                    </div>
                    {[S.LIVRAISON,S.LIVRE].includes(f.status)&&(
                      <span style={{fontSize:12,fontWeight:700,color:'var(--green-vivid)',whiteSpace:'nowrap'}}>{(f.pricePaid*f.qty).toLocaleString()}F</span>
                    )}
                  </div>
                </React.Fragment>
              );
            })}
            {feed.length===0&&<div style={{padding:20,textAlign:'center',color:'var(--muted)',fontSize:13}}>Aucune activité</div>}
          </div>
        </div>
      )}

      {/* ===== TAB: FINANCES ===== */}
      {tab==='finance'&&(
        <div style={{padding:'8px 12px'}}>
          {/* Big numbers */}
          <div style={{background:'linear-gradient(135deg,#111,#2a2a2a)',borderRadius:14,padding:20,marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
              <div>
                <div style={{fontSize:11,color:'#888'}}>Chiffre d'affaires</div>
                <div style={{fontSize:32,fontWeight:800,color:'#fff',letterSpacing:-1}}>{pCA.toLocaleString()} F</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:11,color:'#888'}}>À verser</div>
                <div style={{fontSize:24,fontWeight:800,color:toVerse>=0?'#4ade80':'#f87171',letterSpacing:-0.5}}>{toVerse.toLocaleString()} F</div>
              </div>
            </div>
          </div>

          {/* Breakdown */}
          <div style={{background:'#fff',borderRadius:14,padding:14,marginBottom:8,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>Détail financier</div>
            {[
              {l:"CA total",v:pCA,c:'var(--green-vivid)',sign:'+'},
              {l:"Coûts livraison",v:pDelCost,c:'var(--red-vivid)',sign:'-'},
              {l:`Salaire (${salaryRate.toLocaleString()}F × ${livres.length})`,v:pSalary,c:'var(--red-vivid)',sign:'-'},
              {l:"Dépenses",v:pExpTotal,c:'var(--red-vivid)',sign:'-'},
            ].map((r,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #f5f5f0',fontSize:13}}>
                <span style={{color:'var(--muted)'}}>{r.l}</span>
                <span style={{fontWeight:700,color:r.c}}>{r.sign}{r.v.toLocaleString()} F</span>
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'space-between',padding:'12px 0 4px',fontSize:15,fontWeight:800}}>
              <span>Net à verser</span>
              <span style={{color:toVerse>=0?'var(--green-vivid)':'var(--red-vivid)'}}>{toVerse.toLocaleString()} F</span>
            </div>
          </div>

          {/* Expenses */}
          <div style={{background:'#fff',borderRadius:14,padding:14,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>Dépenses du jour ({todayExp.length})</div>
            {todayExp.length===0&&<div style={{padding:12,textAlign:'center',color:'var(--muted)',fontSize:13}}>Aucune dépense</div>}
            {todayExp.map((e,i)=>(
              <div key={e.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:i<todayExp.length-1?'1px solid #f5f5f0':'none',fontSize:13}}>
                <div>
                  <span style={{fontWeight:500}}>{e.label}</span>
                  <span style={{fontSize:10,color:'var(--muted)',marginLeft:6}}>{new Date(e.date).toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'})}</span>
                </div>
                <span style={{fontWeight:700}}>{e.amount.toLocaleString()} F</span>
              </div>
            ))}
          </div>

          {/* Stock */}
          <div style={{background:'#fff',borderRadius:14,padding:14,marginTop:8,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>Stock</div>
            {config.products.map((p,i)=>{
              const delivered=orders.filter(o=>o.status===S.LIVRE).filter(o=>{
                const aliases=[p.name,...(p.aliases||[])];
                return aliases.some(a=>o.productName&&o.productName.toLowerCase().includes(a.toLowerCase()));
              }).reduce((s,o)=>s+o.quantity,0);
              const remaining=p.stock-delivered;
              const color=remaining<=5?'var(--red-vivid)':remaining<=15?'var(--amber-vivid)':'var(--green-vivid)';
              return(
                <div key={p.id||i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:i<config.products.length-1?'1px solid #f5f5f0':'none'}}>
                  <span style={{fontSize:13}}>{p.name}</span>
                  <div style={{display:'flex',alignItems:'baseline',gap:4}}>
                    <span style={{fontSize:20,fontWeight:800,color}}>{remaining}</span>
                    <span style={{fontSize:11,color:'var(--muted)'}}>/ {p.stock}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ============== NAV BADGE ==============
function NavBadge({count}){
  if(!count||count<=0)return null;
  return(
    <span style={{position:'absolute',top:0,right:'50%',transform:'translateX(12px)',minWidth:16,height:16,borderRadius:8,background:'var(--red-vivid)',color:'#fff',fontSize:9,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px',lineHeight:1}}>{count>9?'9+':count}</span>
  );
}

// ============== LOGIN ==============
function Login({onLogin}){
  const [code,setCode]=useState('');
  const [error,setError]=useState('');
  const [blocked,setBlocked]=useState(false);
  const [blockTimer,setBlockTimer]=useState(0);

  // Check if blocked on mount + countdown
  useEffect(()=>{
    const check=()=>{
      // Check if manager forced unblock
      const unblockTs=gs('forceUnblock',0);
      const attempts=gs('loginAttempts',[]);
      const recent=attempts.filter(a=>Date.now()-a.ts<600000);
      // If manager unblocked after the last failed attempt, clear block
      if(unblockTs&&recent.length>0&&unblockTs>Math.max(...recent.map(a=>a.ts))){
        setBlocked(false);setBlockTimer(0);return;
      }
      if(recent.length>=5){
        setBlocked(true);
        const oldest=Math.min(...recent.map(a=>a.ts));
        const remaining=Math.ceil((600000-(Date.now()-oldest))/1000);
        setBlockTimer(Math.max(0,remaining));
        if(remaining<=0){setBlocked(false);setBlockTimer(0)}
      }else{
        setBlocked(false);setBlockTimer(0);
      }
    };
    check();
    const t=setInterval(check,1000);
    return()=>clearInterval(t);
  },[]);

  const tryLogin=(inputCode)=>{
    if(!inputCode||inputCode.length<2){setError('Entre un code (minimum 2 caractères)');return}

    // MANAGER is ALWAYS allowed, never blocked
    if(inputCode==='MANAGER'){ss('loginAttempts',[]);onLogin(inputCode);return}

    if(blocked){setError(`Bloqué — réessaye dans ${Math.ceil(blockTimer/60)} min`);return}

    // Valid codes = ONLY current codes from metadata and config (not internal space IDs)
    const spaces=gs('spaces',['CM01','SN01']);
    const meta=gs('spacesMeta',{});

    const matchedSpace=spaces.find(s=>{
      // Check metadata code first
      if(meta[s]&&meta[s].code===inputCode)return true;
      // Check stored config code
      const cfg=gs('config_'+s,null);
      if(cfg&&cfg.closeuseCode===inputCode)return true;
      // Fallback: space ID only if no custom code was ever set
      if(!meta[s]&&!cfg)return s===inputCode;
      return false;
    });

    if(matchedSpace){
      ss('loginAttempts',[]);
      onLogin(matchedSpace);
    }else{
      const attempts=gs('loginAttempts',[]);
      attempts.push({ts:Date.now(),code:inputCode,ua:navigator.userAgent});
      ss('loginAttempts',attempts);
      const recentFails=attempts.filter(a=>Date.now()-a.ts<600000);
      if(recentFails.length>=5){
        setBlocked(true);
        setError('Trop de tentatives — bloqué 10 minutes.');
        const alerts=gs('securityAlerts',[]);
        alerts.push({ts:Date.now(),attempts:recentFails.length,lastCode:inputCode,ua:navigator.userAgent});
        ss('securityAlerts',alerts);
        if(db)db.collection('alerts').add({type:'login_blocked',ts:new Date().toISOString(),attempts:recentFails.length,lastCode:inputCode,ua:navigator.userAgent}).catch(()=>{});
      }else{
        setError(`Code incorrect. ${5-recentFails.length} essai${5-recentFails.length>1?'s':''} restant${5-recentFails.length>1?'s':''}.`);
      }
    }
  };

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',padding:24,background:'#111'}}>
      <div style={{width:72,height:72,borderRadius:18,background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20}}>
        <span style={{fontSize:28,fontWeight:800,letterSpacing:-1}}>C<span style={{color:'#16A34A'}}>P</span></span>
      </div>
      <h1 style={{color:'#fff',fontSize:26,fontWeight:700,letterSpacing:-0.5,marginBottom:4}}>ClosePro</h1>
      <p style={{color:'#666',fontSize:13,marginBottom:28}}>Gestion des commandes</p>
      <input className="input" placeholder="Code (ex: CM01)" value={code} onChange={e=>{setCode(e.target.value.toUpperCase());setError('')}}
        style={{maxWidth:260,textAlign:'center',fontSize:20,letterSpacing:6,fontWeight:700,padding:14,borderColor:error?'#EF4444':'var(--border)'}}
        onKeyDown={e=>{if(e.key==='Enter')tryLogin(code)}}/>
      {error&&<div style={{marginTop:10,padding:'8px 16px',borderRadius:10,background:'rgba(239,68,68,0.15)',color:'#FCA5A5',fontSize:13,fontWeight:500,maxWidth:280,textAlign:'center'}}>{error}</div>}
      {blocked&&blockTimer>0&&<div style={{marginTop:6,fontSize:12,color:'#666',fontVariantNumeric:'tabular-nums'}}>Déblocage dans {Math.floor(blockTimer/60)}:{String(blockTimer%60).padStart(2,'0')}</div>}
      <button onClick={()=>tryLogin(code)} style={{marginTop:14,width:260,padding:14,background:blocked?'#333':'#fff',color:blocked?'#666':'#111',borderRadius:14,fontWeight:700,fontSize:15,opacity:blocked?0.6:1}}>
        {blocked?'Bloqué':'Connexion'}
      </button>
    </div>
  );
}

// ============== APP ==============
function App(){
  const [user,setUser]=useState(()=>gs('user',null));
  const [tab,setTab]=useState(()=>{const u=gs('user',null);return u&&u.code==='MANAGER'?'dashboard':'orders'});
  const [spaceCode,setSpaceCode]=useState(()=>{const u=gs('user',null);return u?u.code==='MANAGER'?(gs('mgrSpace','CM01')):u.code:null});

  if(!user)return <Login onLogin={(code)=>{
    const u={code};ss('user',u);setUser(u);
    if(code==='MANAGER'){setTab('dashboard');setSpaceCode(gs('mgrSpace','CM01'))}
    else{setTab('orders');setSpaceCode(code)}
  }}/>;

  const isMgr=user.code==='MANAGER';
  const changeSpace=(code)=>{setSpaceCode(code);ss('mgrSpace',code)};

  return(
    <Provider key={spaceCode} spaceCode={spaceCode} isMgr={isMgr}>
      <AppInner isMgr={isMgr} tab={tab} setTab={setTab} setUser={setUser} spaceCode={spaceCode} changeSpace={changeSpace}/>
    </Provider>
  );
}

function AppInner({isMgr,tab,setTab,setUser,spaceCode,changeSpace}){
  const {messages,orders,now,config,spacesStatus}=useContext(Ctx);

  const unreadMsgs=messages.filter(m=>m.from===(isMgr?'closeuse':'manager')&&!m.seen).length;
  const nonAppeles=orders.filter(o=>o.status===S.NEW||(o.timerExp&&now>o.timerExp&&[S.INJOIGNABLE,S.RAPPELE,S.REPORTE].includes(o.status))).length;

  const isOnline=(code)=>{
    // Check Firebase status first, then localStorage fallback
    const fbSt=spacesStatus[code];
    if(fbSt&&fbSt.lastSeen)return(now-fbSt.lastSeen)<60000;
    const localSeen=gs('lastSeen_'+code,0);
    return localSeen?(now-localSeen)<60000:false;
  };
  const [spaces,setSpaces]=useState(()=>gs('spaces',['CM01','SN01']));
  const meta=gs('spacesMeta',{});
  useEffect(()=>{setSpaces(gs('spaces',['CM01','SN01']))},[config]);

  const getSpaceName=(id)=>meta[id]?.name||id;
  const getSpaceCode=(id)=>meta[id]?.code||id;

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {isMgr&&(
        <div style={{background:'#111',padding:'8px 12px',display:'flex',alignItems:'center',gap:6,flexShrink:0,overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
          {spaces.map(s=>{
            const online=isOnline(s);
            const name=getSpaceName(s);
            return(
              <button key={s} onClick={()=>changeSpace(s)} onContextMenu={e=>{e.preventDefault();if(spaces.length>1&&confirm(`Supprimer l'espace "${name}" ?`)){const ns=spaces.filter(x=>x!==s);ss('spaces',ns);setSpaces(ns);if(spaceCode===s)changeSpace(ns[0])}}} style={{padding:'5px 12px',borderRadius:10,fontSize:12,fontWeight:spaceCode===s?700:400,background:spaceCode===s?'#fff':'rgba(255,255,255,0.08)',color:spaceCode===s?'#111':'#888',display:'flex',alignItems:'center',gap:6,flexShrink:0,border:spaceCode===s?'none':'1px solid rgba(255,255,255,0.1)'}}>
                <span style={{width:7,height:7,borderRadius:4,background:online?'#22C55E':'#555',flexShrink:0}}/>
                {name}
              </button>
            );
          })}
          <button onClick={()=>{
            const name=prompt('Nom de la closeuse (ex: Marie Sénégal)');
            if(!name||!name.trim())return;
            const id='sp_'+gid().slice(0,6);
            const code=prompt('Code de connexion (ex: SN01)')||id;
            const ns=[...spaces,id];
            ss('spaces',ns);
            const m=gs('spacesMeta',{});
            m[id]={name:name.trim(),code:code.trim().toUpperCase()};
            ss('spacesMeta',m);
            setSpaces(ns);
            changeSpace(id);
          }} style={{padding:'5px 10px',borderRadius:10,fontSize:14,background:'rgba(255,255,255,0.08)',color:'#555',flexShrink:0}}>+</button>
        </div>
      )}

      {!isMgr&&tab==='orders'&&<OrdersPage/>}
      {!isMgr&&tab==='report'&&<ReportPage/>}
      {!isMgr&&tab==='chat'&&<ChatPage isMgr={false}/>}
      {!isMgr&&tab==='config'&&<ConfigPage isManager={false}/>}
      {isMgr&&tab==='dashboard'&&<ManagerDashboard/>}
      {isMgr&&tab==='orders'&&<OrdersPage/>}
      {isMgr&&tab==='chat'&&<ChatPage isMgr={true}/>}
      {isMgr&&tab==='report'&&<ReportPage/>}
      {isMgr&&tab==='config'&&<ConfigPage isManager={true}/>}

      {/* Notification popup for closeuse only — outside of all pages */}
      {tab!=='chat'&&<NotificationPopup isMgr={isMgr}/>}
      <NotifEngine isMgr={isMgr}/>

      <div className="bottom-nav">
        {isMgr&&<button className={tab==='dashboard'?'active':''} onClick={()=>setTab('dashboard')} style={{position:'relative'}}><I.dash/><NavBadge count={nonAppeles}/>Dashboard</button>}
        <button className={tab==='orders'?'active':''} onClick={()=>setTab('orders')} style={{position:'relative'}}><I.list/>{!isMgr&&<NavBadge count={nonAppeles}/>}Commandes</button>
        <button className={tab==='chat'?'active':''} onClick={()=>setTab('chat')} style={{position:'relative'}}><I.chat/><NavBadge count={unreadMsgs}/>Chat</button>
        <button className={tab==='report'?'active':''} onClick={()=>setTab('report')}><I.chart/>Rapport</button>
        <button className={tab==='config'?'active':''} onClick={()=>setTab('config')}><I.settings/>Config</button>
        <button onClick={()=>{if(confirm('Tu veux vraiment te déconnecter ?')){ss('user',null);setUser(null)}}}><I.user/>Déco</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
